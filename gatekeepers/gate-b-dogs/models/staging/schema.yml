
version: 2

models:
  - name: stg_breeders
    description: "Staging table for breeders data"
    docs:
      node_color: "maroon"  # You can use color names or hex codes
    columns:
      - name: breeder_name
        description: "Name of the breeder"
        data_type: "STRING"
        tests:
          - unique:
              config:
                severity: warn
          - not_null:
              config:
                severity: warn
      - name: breeder_email
        description: "Email contact of the breeder"
        data_type: "STRING"
      - name: distance_from_purchaser
        description: "Distance from the purchaser in miles"
        data_type: "INTEGER"
  - name: stg_breeders_dogs
    description: "Staging table for breeders_dogs data"
    docs:
      node_color: "maroon"  # You can use color names or hex codes
    columns:
      - name: dog_id
        description: "Unique identifier for the dog"
        data_type: "INTEGER"
      - name: breed
        description: "Breed of the dog"
        data_type: "STRING"
      - name: dob
        description: "Date of birth of the dog"
        data_type: "DATE"

  - name: stg_breeds
    description: "Staging table for dogs data"
    docs:
      node_color: "maroon"
    columns:

      - name: breed
        description: "Breed name of the dog"
        data_type: STRING
        tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error

      - name: breed_group
        description: "AKC breed group classification"
        data_type: STRING

      - name: score
        description: "AKC score"
        data_type: NUMBER

      - name: longevity
        description: "Typical lifespan in years"
        data_type: NUMBER

      - name: purchase_price
        description: "Average purchase price (USD equivalent)"
        data_type: NUMBER

      - name: grooming
        description: "Grooming requirement decoded from numeric encoding (daily/weekly/few_weeks)"
        data_type: STRING

      - name: children_suitability
        description: "Suitability for children decoded from numeric encoding (high/medium/low)"
        data_type: STRING

      - name: size
        description: "Dog size category"
        data_type: STRING
        tests:
          - accepted_values:
              values: ['small', 'medium', 'large']
              config:
                severity: error

      - name: weight
        description: "Typical weight in kg"
        data_type: NUMBER

      - name: height
        description: "Height at shoulder in cm"
        data_type: NUMBER

      - name: repetition_bucket
        description: "Training difficulty bucket"
        data_type: STRING

      - name: ailments
        description: "Number of serious genetic ailments"
        data_type: NUMBER