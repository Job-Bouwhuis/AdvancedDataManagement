services:
  python:
    image: teachercraig/adm-course:2026.2
    container_name: adm-working-dev
    volumes:
      - type: bind
        source: ..
        target: /adm-workspace
        read_only: false
        bind:
          selinux: z
    working_dir: /adm-workspace
    command: sleep infinity
    environment:
      - PYTHONUNBUFFERED=1
